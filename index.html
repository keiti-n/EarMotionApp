<!DOCTYPE html>
<html>
<head>
  <title>EarMotion</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="top-bar">

  <button onclick="connect()">Connect</button>
  <button onclick="disconnect()">Disconnect</button>
  <button onclick="toggleDemo()">Demo Mode</button>
  <button onclick="toggleTheme()">Theme</button>

  <button id="recordBtn" onclick="toggleRecording()">Start Recording</button>

  <!-- local file loader -->
  <button onclick="document.getElementById('fileInput').click()">Load CSV</button>
  <input type="file" id="fileInput" hidden onchange="loadLocalCSV(event)">

</div>

<h1 id="status">Not Connected</h1>

<div class="ml">
  <p>EEG: <span id="eegEmotion">-</span></p>
  <p>EMG: <span id="emgEmotion">-</span></p>
</div>

<div class="container">

  <div class="card">
    <h2>EEG</h2>
    <canvas id="eegChart"></canvas>
  </div>

  <div class="card">
    <h2>EMG</h2>
    <canvas id="emgChart"></canvas>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
