<!DOCTYPE html>
<html>
<head>
  <title>Brain & Muscle Monitor</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="top-bar">
  <button onclick="connect()">Connect</button>
  <button onclick="disconnect()">Disconnect</button>
  <button onclick="toggleDemo()">Demo Mode</button>
  <button onclick="toggleTheme()">Toggle Theme</button>
  <button onclick="startRecording()">Start Recording</button>
  <button onclick="stopRecording()">Stop & Download CSV</button>
</div>

<div class="top-bar">
  <input id="azureUrl" placeholder="Azure CSV URL" style="padding:8px;width:60%">
  <button onclick="loadAzureCSV()">Load Azure Data</button>
</div>

<h1 id="status">Not Connected</h1>

<div id="mlStatus">
  <p>SVM: <span id="svmOut">-</span></p>
  <p>Azure ML: <span id="azureOut">-</span></p>
</div>

<div class="container">

  <!-- EEG -->
  <div class="card">
    <h2>EEG Bands</h2>
    <p id="eegEmotion">No Data</p>
    <canvas id="eegChart"></canvas>
  </div>

  <!-- EMG -->
  <div class="card">
    <h2>EMG Activity</h2>
    <p id="emgEmotion">No Data</p>
    <canvas id="emgChart"></canvas>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
