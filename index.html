<!DOCTYPE html>
<html>
<head>
  <title>EarMotion</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="top-bar">
  <div class="leftSection">
    <img id="logo" src="assets/images/logo_light.png" class="logo">
    <span class="title">EarMotion</span>
  </div>

  <div class="controls">
    <button id="connectBtn" onclick="toggleConnection()">Connect</button>
    <button onclick="toggleDemo()">Demo Mode</button>
    <button onclick="toggleTheme()">Toggle Theme</button>
    <button id="recordBtn" onclick="toggleRecording()">Start Recording</button>
    <button onclick="downloadCSV()">Download CSV</button>
  </div>
</div>
  
<h1 id="status">Not Connected</h1>

<div class="container">

  <!-- EEG CARD -->
  <div class="card">
  <h2>EEG Bands</h2>
  <p id="eegEmotion">No Data</p>

  <div class="toggle">
    <button onclick="showEEGRealtime()">Realtime</button>
    <button onclick="showEEGTrends()">Daily Trends</button>
  </div>

  <!-- REALTIME VIEW -->
  <div id="eegRealtime">
    <canvas id="eegChart"></canvas>
  </div>

  <!-- TRENDS VIEW (hidden for now) -->
  <div id="eegTrends" style="display:none;">
    <canvas id="eegTrendChart"></canvas>

    <table id="eegTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Avg Power</th>
          <th>Emotion</th>
          <th>Fluctuations</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>
  
  <!-- EMG CARD -->
  <div class="card">
    <h2>EMG Activity</h2>
    <p id="emgEmotion">No Data</p>
    <canvas id="emgChart"></canvas>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
