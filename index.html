<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neuro Monitor</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ================= HEADER ================= -->
  <h1>🧠 Neuro Monitor</h1>

  <!-- ================= CONTROLS ================= -->
  <div class="controls">
    <button onclick="connect()">Connect BLE</button>
    <button onclick="toggleDemo()">Demo Mode</button>
    <button id="recordBtn" onclick="toggleRecording()">Record</button>
  </div>

  <!-- ================= STATUS ================= -->
  <p id="status">Disconnected</p>

  <!-- ================= EMOTION SUMMARY ================= -->
  <div class="card">
    <h2>EEG Emotion: <span id="eegEmotion">-</span></h2>
    <h2>EMG State: <span id="emgEmotion">-</span></h2>
  </div>

  <!-- ================= MAIN SPLIT LAYOUT ================= -->
  <div class="split">

    <!-- ================= EEG PANEL ================= -->
    <div class="card">
      <h2>EEG Signal</h2>
      <canvas id="eegChart"></canvas>
    </div>

    <!-- ================= EMG PANEL ================= -->
    <div class="card">
      <h2>EMG Signal</h2>
      <canvas id="emgChart"></canvas>
    </div>

  </div>

  <!-- ================= DATA INPUT ================= -->
  <div class="card">
    <h2>Load CSV</h2>
    <input type="file" onchange="loadLocalCSV(event)" />
  </div>

  <!-- ================= SCRIPT ================= -->
  <script src="script.js"></script>

</body>
</html>
