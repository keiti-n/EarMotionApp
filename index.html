<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>EarMotion</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🧠 Neuro Monitor</h1>

<div class="controls">
  <button onclick="connect()">Connect BLE</button>
  <button onclick="toggleDemo()">Demo</button>
  <button id="recordBtn" onclick="toggleRecording()">Record</button>
</div>

<p id="status">Disconnected</p>

<div class="card">
  <h2>EEG Emotion: <span id="eegEmotion">-</span></h2>
  <h2>EMG State: <span id="emgEmotion">-</span></h2>
</div>

<div class="card">
  <canvas id="eegChart"></canvas>
</div>

<div class="card">
  <canvas id="emgChart"></canvas>
</div>

<div class="card">
  <input type="file" onchange="loadLocalCSV(event)">
</div>

<script src="script.js"></script>

</body>
</html>
