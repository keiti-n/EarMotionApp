<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Neuro Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    canvas { max-width: 100%; margin-bottom: 20px; }
    button { margin: 5px; padding: 10px; }
  </style>
</head>

<body>

<h2>EEG + EMG Monitor</h2>

<button onclick="connect()">Connect BLE</button>
<button onclick="toggleDemo()">Toggle Demo</button>
<button id="recordBtn" onclick="toggleRecording()">Start Recording</button>

<p id="status">Disconnected</p>

<h3>EEG Emotion: <span id="eegEmotion">-</span></h3>
<h3>EMG State: <span id="emgEmotion">-</span></h3>

<canvas id="eegChart"></canvas>
<canvas id="emgChart"></canvas>

<input type="file" onchange="loadLocalCSV(event)" />

<script src="script.js"></script>

</body>
</html>
