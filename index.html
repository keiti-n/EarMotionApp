<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Brain & Muscle Monitor</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
  <div class="title">Brain & Muscle Monitor</div>

  <div class="controls">
    <button onclick="connect()">Connect</button>
    <button onclick="toggleDemo()">Demo</button>
    <button onclick="toggleTheme()">Theme</button>
    <button id="recordBtn" onclick="toggleRecording()">Record</button>
    <button onclick="downloadCSV()">Download</button>
    <input type="file" onchange="loadLocalCSV(event)">
  </div>
</div>

<div id="status">Disconnected</div>

<div class="overall">
  Overall Emotion: <span id="overallEmotion">-</span>
</div>

<!-- ================= MAIN GRID ================= -->
<div class="grid">

  <!-- EEG -->
  <div class="panel">
    <div class="panelHeader">
      EEG
      <span id="eegEmotion">-</span>
    </div>

    <canvas id="eegChart"></canvas>

    <div class="subButtons">
      <button onclick="setView('eeg','realtime')">Realtime</button>
      <button onclick="setView('eeg','trend')">Daily Trends</button>
    </div>

    <canvas id="eegTrend"></canvas>
  </div>

  <!-- EMG -->
  <div class="panel">
    <div class="panelHeader">
      EMG
      <span id="emgEmotion">-</span>
    </div>

    <canvas id="emgChart"></canvas>

    <div class="subButtons">
      <button onclick="setView('emg','realtime')">Realtime</button>
      <button onclick="setView('emg','trend')">Daily Trends</button>
    </div>

    <canvas id="emgTrend"></canvas>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
