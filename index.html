<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EarMotion</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= TOP BAR ================= -->
<div class="topbar">
  <div class="title">EarMotion</div>

  <div class="controls">
    <button onclick="connect()">Connect</button>
    <button onclick="toggleDemo()">Demo</button>
    <button onclick="toggleTheme()">Theme</button>
    <button onclick="toggleRecording()">Record</button>
    <button onclick="downloadCSV()">Download</button>
    <input type="file" onchange="loadLocalCSV(event)">
  </div>
</div>

<div id="status">Disconnected</div>

<!-- ================= OVERALL ================= -->
<div class="overall">
  Overall Emotion: <span id="overallEmotion">-</span>
</div>

<!-- ================= GRID ================= -->
<div class="grid">

  <!-- ================= EEG ================= -->
  <div class="panel">

    <div class="panelHeader">
      EEG
      <span id="eegEmotion">-</span>
    </div>

    <div class="toggleRow">
      <button onclick="setEEGView('rt')">Realtime</button>
      <button onclick="setEEGView('trend')">Trends</button>
    </div>

    <canvas id="eegChart"></canvas>

    <table id="eegTable">
      <thead>
        <tr>
          <th>Date</th><th>Power</th><th>Emotion</th><th>Fluct</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

  <!-- ================= EMG ================= -->
  <div class="panel">

    <div class="panelHeader">
      EMG
      <span id="emgEmotion">-</span>
    </div>

    <div class="toggleRow">
      <button onclick="setEMGView('rt')">Realtime</button>
      <button onclick="setEMGView('trend')">Trends</button>
    </div>

    <canvas id="emgChart"></canvas>

    <table id="emgTable">
      <thead>
        <tr>
          <th>Date</th><th>Power</th><th>Emotion</th><th>Fluct</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
