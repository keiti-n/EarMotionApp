<!DOCTYPE html>
<html>
<head>
  <title>EarMotion</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="top-bar">
  <div class="leftSection">
    <img id="logo" src="assets/images/logo_light.png" class="logo">
    <span class="title">EarMotion</span>
  </div>

  <div class="controls">
    <button id="connectBtn" onclick="toggleConnection()">Connect</button>
    <button onclick="toggleDemo()">Demo Mode</button>
    <button onclick="toggleTheme()">Toggle Theme</button>
    <button id="recordBtn" onclick="toggleRecording()">Start Recording</button>
    <button onclick="downloadCSV()">Download CSV</button>
    <button onclick="selectDataFolder()">Data Folder</button>
  </div>
</div>
  
<h1 id="status">Not Connected</h1>

<div class="container">

  <!-- EEG CARD -->
  <div class="card">
  <h2>EEG Bands</h2>
  <p id="eegEmotion">No Data</p>

  <div class="toggle">
    <button onclick="showEEGRealtime()">Realtime</button>
    <button onclick="showEEGTrends()">Daily Trends</button>
  </div>

  <div id="eegRealtime">  <!-- REALTIME VIEW -->
    <canvas id="eegChart"></canvas>
  </div>

  <div id="eegTrends" style="display:none;">   <!-- TRENDS VIEW -->
    <canvas id="eegTrendChart"></canvas>

    <table id="eegTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Avg Power</th>
          <th>Emotion</th>
          <th>Fluctuations</th>
          <th>Duration (min)</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>
  
  <!-- EMG CARD -->
  <div class="card">
    <h2>EMG Activity</h2>
  <div class="card">
    <h2>EMG Activity</h2>
    <p id="emgEmotion">No Data</p>

    <!-- TOGGLE -->
    <div class="toggle" id="emgToggle">
      <button onclick="showEMGRealtime()">Realtime</button>
      <button onclick="showEMGTrends()">Daily Trends</button>
    </div>

  <!-- REALTIME -->
    <div id="emgRealtime">
      <canvas id="emgChart"></canvas>
    </div>

  <!-- TRENDS -->
    <div id="emgTrends" style="display:none;">
      <canvas id="emgTrendChart"></canvas>

      <h3>Daily EMG Summary</h3>

      <table id="emgTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Avg EMG</th>
            <th>Activity</th>
            <th>Duration (min)</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
